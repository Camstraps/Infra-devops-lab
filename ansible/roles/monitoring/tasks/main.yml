---
- name: Create monitoring directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/monitoring
    - /opt/monitoring/prometheus
    - /opt/monitoring/grafana/provisioning/datasources
    - /opt/monitoring/grafana/provisioning/dashboards
    - /opt/monitoring/grafana/dashboards

- name: Create Prometheus config
  copy:
    dest: /opt/monitoring/prometheus/prometheus.yml
    owner: root
    group: root
    mode: "0644"
    content: |
      global:
        scrape_interval: 10s

      scrape_configs:
        - job_name: "prometheus"
          static_configs:
            - targets:
                - "prometheus:9090"

        - job_name: "node_exporter"
          static_configs:
            - targets:
                - "10.10.20.10:9100"
                - "10.10.10.10:9100"
                - "10.10.20.20:9100"
  notify: Restart Prometheus


- name: Create Grafana datasource provisioning config
  copy:
    dest: /opt/monitoring/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: root
    mode: "0644"
    content: |
      apiVersion: 1

      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: true

        - name: Loki
          type: loki
          access: proxy
          url: http://10.10.20.30:3100
          editable: true
  notify: Restart Grafana


- name: Deploy Grafana dashboard provider
  copy:
    src: grafana/provisioning/dashboards/default.yml
    dest: /opt/monitoring/grafana/provisioning/dashboards/default.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart Grafana

- name: Deploy Grafana Node Exporter dashboard
  copy:
    src: grafana/dashboards/node-exporter.json
    dest: /opt/monitoring/grafana/dashboards/node-exporter.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart Grafana


- name: Create monitoring docker-compose file
  copy:
    dest: /opt/monitoring/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
    content: |
      services:
        grafana:
          image: grafana/grafana:latest
          container_name: grafana
          restart: unless-stopped
          ports:
            - "3000:3000"
          volumes:
            - grafana-data:/var/lib/grafana
            - /opt/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - /opt/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

        prometheus:
          image: prom/prometheus:latest
          container_name: prometheus
          restart: unless-stopped
          ports:
            - "9090:9090"
          volumes:
            - /opt/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus

      volumes:
        grafana-data:
        prometheus-data:

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: /opt/monitoring
    state: present
