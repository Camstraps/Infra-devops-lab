- name: Ensure hostname is resolvable locally
  lineinfile:
    path: /etc/hosts
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present

- name: Create Traefik directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/traefik
    - /opt/traefik/config

- name: Create Traefik docker-compose file
  copy:
    dest: /opt/traefik/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
    content: |
      services:
        traefik:
          image: traefik:v3.6
          container_name: traefik
          restart: unless-stopped
          command:
            - "--api.dashboard=true"
            - "--api.insecure=true"
            - "--providers.docker=true"
            - "--providers.docker.exposedbydefault=false"
            - "--entrypoints.web.address=:80"
            - "--providers.file.filename=/etc/traefik/dynamic.yml"
          ports:
            - "80:80"
            - "8080:8080"
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /opt/traefik/config/dynamic.yml:/etc/traefik/dynamic.yml:ro

- name: Create Traefik dynamic config
  copy:
    dest: /opt/traefik/config/dynamic.yml
    owner: root
    group: root
    mode: "0644"
    content: |
      http:
        routers:
          demo-app:
            rule: "Host(`demo.lab.local`)"
            entryPoints:
              - web
            service: demo-app

        services:
          demo-app:
            loadBalancer:
              servers:
                - url: "http://10.10.20.10:8081"

- name: Start Traefik stack
  command: docker compose up -d
  args:
    chdir: /opt/traefik
