---
- name: Create Loki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/loki
    - /opt/loki/config
    - /opt/loki/data

- name: Create Loki config
  copy:
    dest: /opt/loki/config/loki.yml
    owner: root
    group: root
    mode: "0644"
    content: |
      auth_enabled: false

      server:
        http_listen_port: 3100

      common:
        path_prefix: /loki
        storage:
          filesystem:
            chunks_directory: /loki/chunks
            rules_directory: /loki/rules
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory

      schema_config:
        configs:
          - from: 2024-01-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      limits_config:
        retention_period: 168h
        allow_structured_metadata: false

      compactor:
        working_directory: /loki/compactor
        retention_enabled: true
        delete_request_store: filesystem
  notify: Restart Loki

- name: Create Loki docker-compose file
  copy:
    dest: /opt/loki/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
    content: |
      services:
        loki:
          image: grafana/loki:latest
          container_name: loki
          restart: unless-stopped
          command: -config.file=/etc/loki/loki.yml
          ports:
            - "3100:3100"
          volumes:
            - /opt/loki/config/loki.yml:/etc/loki/loki.yml:ro
            - /opt/loki/data:/loki

- name: Start Loki stack
  community.docker.docker_compose_v2:
    project_src: /opt/loki
    state: present
