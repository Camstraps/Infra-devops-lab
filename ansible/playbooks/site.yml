- name: Configure Docker hosts
  hosts: docker_hosts
  become: true

  roles:
    - docker
    - demo_app

- name: Configure reverse proxy
  hosts: dmz
  become: true

  vars_files:
    - ../secrets/traefik/tls.yml

  roles:
    - docker
    - traefik

- name: Configure monitoring stack
  hosts: monitoring
  become: true

  roles:
    - docker
    - monitoring
